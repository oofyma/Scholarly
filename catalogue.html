<!DOCTYPE html>
<html>
<head>
  <title>Catalogue — 🤺Tutorial</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo-link"><div class="logo">🤺Tutorial</div></a>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="signin.html">Sign in</a>
    <a href="catalogue.html">Browse tutors</a>
  </div>
</nav>

<div class="catalogue-header">
  <h2>Tutor catalogue</h2>
  <p>Browse all available tutors</p>
</div>

<div class="catalogue-actions">
  <div class="catalogue-actions-left">
    <button class="register-tutor-btn" id="register-tutor-btn" onclick="toggleTutorForm()" style="display:none">
      + Register as a tutor
    </button>
    <button class="secondary-btn" id="view-tutor-btn" onclick="viewMyTutorProfile()" style="display:none">
      View your tutor profile
    </button>
  </div>
</div>

<div class="search-filter-bar">
  <input type="text" id="search-input" placeholder="Search by any keywords..." oninput="applyFilters()">
  <select id="filter-format" onchange="applyFilters()">
    <option value="">All formats</option>
    <option value="Online">Online</option>
    <option value="In-person">In-person</option>
    <option value="Both online and in person">Both online and in person</option>
  </select>
  <div class="price-range-wrap">
    <span class="price-range-label">$</span>
    <input type="number" id="filter-price-min" placeholder="Min" min="0" oninput="applyFilters()" class="price-input">
    <span class="price-range-label">–</span>
    <input type="number" id="filter-price-max" placeholder="Max" min="0" oninput="applyFilters()" class="price-input">
    <span class="price-range-label">/hr</span>
  </div>
  <select id="filter-sort" onchange="applyFilters()">
    <option value="">Sort: Default</option>
    <option value="price-asc">Price: Low to high</option>
    <option value="price-desc">Price: High to low</option>
  </select>
  <button class="clear-btn" onclick="clearFilters()">Clear</button>
</div>

<div class="tutor-form-wrap" id="tutor-form" style="display:none">
  <h3 id="tutor-form-title">Register as a tutor</h3>
  <p>Fill in your details to advertise your services on 🤺Tutorial.</p>

  <label>Full name</label>
  <input type="text" id="t-name">

  <label>Subjects (e.g. Maths, English)</label>
  <input type="text" id="t-subjects">

  <label>Target students (e.g. Years 9–12, Primary school, Adult learners)</label>
  <input type="text" id="t-target" placeholder="e.g. Years 9–12, HSC students">

  <label>Hourly rate (AUD per hour)</label>
  <div class="input-prefix-wrap">
    <span class="input-prefix">$</span>
    <input type="number" id="t-rate" class="input-with-prefix" min="0" placeholder="e.g. 60">
    <span class="input-suffix">/hr</span>
  </div>

  <label>Location</label>
  <input type="text" id="t-location" placeholder="e.g. Sydney, NSW">

  <label>Teaching format</label>
  <select id="t-format">
    <option value="Online">Online</option>
    <option value="In-person">In-person</option>
    <option value="Both online and in person">Both online and in person</option>
  </select>

  <label>Availability</label>
  <input type="text" id="t-availability" placeholder="e.g. Mon–Fri after 4pm, weekends">

  <label>Contact details</label>
  <input type="text" id="t-contact" placeholder="e.g. john@email.com or 0412 345 678">

  <label>About me</label>
  <textarea id="t-about" rows="4" placeholder="Describe your expertise, qualifications, teaching style, and what you offer..."></textarea>

  <label>Profile picture or logo (optional)</label>
  <input type="file" id="t-avatar" accept="image/*">

  <div id="tutor-error" style="color:red; font-size:13px; margin-bottom:10px; display:none;"></div>

  <button class="signin-btn" id="tutor-submit-btn" onclick="submitTutorProfile()">Submit profile</button>
  <button class="cancel-btn" onclick="toggleTutorForm()">Cancel</button>
</div>

<div id="tutor-list">
  <div class="empty-state" id="empty-state">No tutors yet.</div>
</div>

<script src="db.js"></script>
<script src="script.js"></script>
</body>
</html>
