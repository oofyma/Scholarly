<!DOCTYPE html>
<html>
<head>
  <title>Sign In — Tutorial</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <div class="logo">Tutorial</div>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="signin.html">Sign in</a>
    <a href="catalogue.html">Browse tutors</a>
  </div>
</nav>

<div class="signin-wrap">
  <h2 id="form-title">Sign in</h2>
  <p id="form-sub">Welcome back</p>

  <div id="reg-name" style="display:none">
    <label>Full name</label>
    <input type="text" id="input-name">
  </div>

  <label>Email</label>
  <input type="email" id="input-email">

  <label>Password</label>
  <input type="password" id="input-password">

  <div id="error-msg" style="color:red; font-size:13px; margin-bottom:10px; display:none;"></div>

  <button class="signin-btn" id="form-btn" onclick="handleSubmit()">Sign in</button>

  <div class="divider-text">— or —</div>
  <span class="toggle-link" id="toggle-link" onclick="toggleForm()">Don't have an account? Register</span>
</div>

<script src="db.js"></script>
<script src="script.js"></script>
</body>
</html>
